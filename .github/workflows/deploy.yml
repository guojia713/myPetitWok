# =============================================
# CI/CD Pipeline — Asian Cuisine API
#
# On every push to main:
#   1. Build & run tests
#   2. Build Docker image
#   3. Push image to AWS ECR
#   4. Deploy to AWS Elastic Beanstalk
#
# On pull requests → build & test only (no deploy)
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_REGION             (e.g. eu-west-1)
#   ECR_REPOSITORY         (e.g. myPetitWok)
#   EB_APPLICATION_NAME
#   EB_ENVIRONMENT_NAME
# =============================================

name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ─── Job 1: Build & Test ──────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: ./mvnw clean verify -q
        # Tests use H2 in-memory DB and application-test.properties
        # No AWS credentials needed here

      - name: Upload JAR artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  # ─── Job 2: Build & Push Docker image to ECR ─────────────────────────────
  docker-build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: |
          TAG="${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${GITHUB_SHA::7}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $TAG"

      - name: Build and push Docker image
        run: |
          docker build -t ${{ steps.meta.outputs.tag }} .
          docker push ${{ steps.meta.outputs.tag }}
          # Also tag as latest
          REGISTRY_REPO="${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}"
          docker tag ${{ steps.meta.outputs.tag }} ${REGISTRY_REPO}:latest
          docker push ${REGISTRY_REPO}:latest

  # ─── Job 3: Deploy to Elastic Beanstalk ──────────────────────────────────
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Generate deployment version label
        id: version
        run: |
          echo "label=v-$(date +'%Y%m%d%H%M')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Create Dockerrun.aws.json (tells Beanstalk which image to run)
        run: |
          ECR_REGISTRY=$(aws ecr describe-repositories \
            --repository-names ${{ secrets.ECR_REPOSITORY }} \
            --query 'repositories[0].repositoryUri' \
            --output text)
          cat > Dockerrun.aws.json << EOF
          {
            "AWSEBDockerrunVersion": "1",
            "Image": {
              "Name": "${ECR_REGISTRY}:${{ needs.docker-build-push.outputs.image-tag }}",
              "Update": "true"
            },
            "Ports": [{"ContainerPort": 5000}]
          }
          EOF

      - name: Upload deployment bundle to S3
        run: |
          zip -r deploy.zip Dockerrun.aws.json
          aws s3 cp deploy.zip \
            s3://elasticbeanstalk-${{ secrets.AWS_REGION }}-${{ secrets.EB_APPLICATION_NAME }}/${{ steps.version.outputs.label }}.zip

      - name: Create Elastic Beanstalk application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "${{ secrets.EB_APPLICATION_NAME }}" \
            --version-label "${{ steps.version.outputs.label }}" \
            --source-bundle \
              S3Bucket="elasticbeanstalk-${{ secrets.AWS_REGION }}-${{ secrets.EB_APPLICATION_NAME }}",\
          S3Key="${{ steps.version.outputs.label }}.zip"

      - name: Deploy to Elastic Beanstalk environment
        run: |
          aws elasticbeanstalk update-environment \
            --application-name "${{ secrets.EB_APPLICATION_NAME }}" \
            --environment-name "${{ secrets.EB_ENVIRONMENT_NAME }}" \
            --version-label "${{ steps.version.outputs.label }}"

      - name: Wait for deployment to be healthy
        run: |
          echo "⏳ Waiting for deployment..."
          aws elasticbeanstalk wait environment-updated \
            --application-name "${{ secrets.EB_APPLICATION_NAME }}" \
            --environment-names "${{ secrets.EB_ENVIRONMENT_NAME }}"
          echo "✅ Deployment complete!"

      - name: Verify health endpoint
        run: |
          EB_URL=$(aws elasticbeanstalk describe-environments \
            --application-name "${{ secrets.EB_APPLICATION_NAME }}" \
            --environment-names "${{ secrets.EB_ENVIRONMENT_NAME }}" \
            --query 'Environments[0].CNAME' \
            --output text)
          echo "Checking health at http://${EB_URL}/health"
          curl --fail --retry 5 --retry-delay 5 "http://${EB_URL}/health"
          echo "✅ Health check passed!"
